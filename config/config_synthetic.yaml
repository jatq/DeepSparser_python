# DeepSparser - Synthetic Wavelet Experiment Configuration

# Data
data_path: dataset/synthetic
checkpoint_path: model/model_synthetic.pt

# DCT patching
dct_width: 256
dct_stride_percent: 0.3
dct_stride: 76          # int(dct_width * dct_stride_percent)

# Learnable transform
embed_dim: 256
init_embedding: true
fix_embedding: false
embed_loss_weight: 0.1

# Denoising autoencoder
patch_n: 15
dae_dims: [32, 64, 128, 256, 128, 64, 32, 16]

# Training
batchsize: 32
lr: 0.01
epochs: 2000
scheduler_step: 20       # epochs // 100
scheduler_gamma: 0.95
